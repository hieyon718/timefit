<!DOCTYPE html>
<html lang="ja"> <head>
    <meta charset="UTF-8">
    <title>timefit | タイムフィット</title>
</head>
<body>
    <h1>timefitへようこそ！</h1>

    {% if user.is_authenticated %}
        <p>こんにちは、<strong>{{ user.username }}</strong> 님！</p>
        
        <a href="{% url 'socialaccount_connections' %}">Googleアカウントを 연동하기</a> | 
        
        <a href="{% url 'account_logout' %}">ログアウト</a>
    {% else %}
        <p>アカウントをお持ちでないですか？</p>
        <a href="{% url 'account_login' %}">ログイン</a> | 
        <a href="{% url 'account_signup' %}">新規登録</a>
        
        <br><br>
        <form action="{% url 'google_login' %}" method="post">
            {% csrf_token %}
            <button type="submit" style="background-color: #4285F4; color: white; padding: 10px;">
                Googleでログイン
            </button>
        </form>
    {% endif %}
</body>
