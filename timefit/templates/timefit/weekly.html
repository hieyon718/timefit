{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFit - 分析ダッシュボード</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}"> 
    <link rel="stylesheet" href="{% static 'css/week.css' %}">
    <script src="{% static 'js/week.js' %}" defer></script>
</head>
<body>

    <div class="app-container week-layout-container">
        
        <header>
            <div>
                <h1>TimeFit</h1>
            </div>
            <div class="header-actions">
                <a href="{% url 'home' %}">🏠</a>
            </div>
        </header>

        <div class="date-sub">⚡ 週刊分析レポート</div>

        <div class="week-navigator-container" style="margin-bottom: 24px;">
            <div class="week-navigator" style="display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px 16px; border-radius: 10px; border: 1px solid #e9ecef;">
                <button id="btn-prev-week" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #2c3e50; padding: 10px;">◀</button>
                <div id="current-date-display" style="font-size: 18px; font-weight: bold; color: #2c3e50;">2026.06.15 ~ 2026.06.21</div>
                
                <button id="btn-next-week" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #2c3e50; padding: 10px;">▶</button>
            </div>
        </div>
        
        <section id="section-weekly" class="analysis-card">
            <div class="card-content-header">
                <h3>🧱 週次タイムフィットブロック</h3>
            </div>

            <div class="weekly-grid-overflow-wrapper">
                <div class="grid-board" id="weekly-grid-board">
                    </div>
            </div>

            <div class="legend-container">
                <div class="legend-item"><div class="legend-dot block-success"></div>成功</div>
                <div class="legend-item"><div class="legend-dot block-underestimated"></div>超過</div>
                <div class="legend-item"><div class="legend-dot block-postponed"></div>先送り</div>
                <div class="legend-item"><div class="legend-dot block-default"></div>一般</div>
            </div>
        </section>

        <section class="analysis-card">
            <div class="card-content-header">
                <h3>⏱️ カテゴリ別 計画 vs 実績</h3>
            </div>
            <div id="category-stats-wrapper">
                </div>
        </section>

        <section class="analysis-card">
            <div class="card-content-header">
                <h3>🕳️ 時間ブラックホール (TOP 3)</h3>
            </div>
            <div id="blackhole-list-wrapper">
                <p style="color:#7f8c8d; font-size:14px;">集計中...</p>
            </div>
        </section>

        <section class="analysis-card" style="margin-bottom: 10px;">
            <div class="card-content-header">
                <h3>🎯 今週の総合タイムフィットスコア</h3>
            </div>
            <div class="score-container-layout">
                <div class="donut-chart-box">
                    <div class="circle-chart">
                        <span class="center-score-text" id="timefit-score-value">0%</span>
                    </div>
                </div>
                <div class="fact-coaching-box score-coaching-theme" id="score-fact-msg">
                    集計中...
                </div>
            </div>
        </section>

    </div>

</body>
</html>
