{% load static %}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFit - 今日のタスク (API)</title>

    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <script>
        // 장고 뷰가 뚫어준 init_date 값을 자바스크립트 전역 변수에 다이렉트로 할당합니다
        window.SERVER_INITIAL_DATE = "{{ init_date }}";
    </script>
    <script src="{% static 'js/home.js' %}" defer></script>
    <script src="{% static 'js/home.js' %}" defer></script>
</head>
<body>

    <div class="app-container">
        <header>
            <div>
                <h1 style="font-size: 24px; margin: 0 0 4px 0; font-weight: 700;">TimeFit</h1>
            </div>
            <div class="header-actions">
                <a href="{% url 'mypage' %}" style="text-decoration: none; font-size: 20px; color: #7f8c8d; padding: 4px;">👤</a>
                <a href="{% url 'category_setting' %}" style="text-decoration: none; font-size: 20px; color: #7f8c8d; padding: 4px;">⚙️</a>
            </div>
        </header>

        <div class="sidebar">
            <ul>
                <li><a href="{% url 'calendar' %}">カレンダー</a></li>
                <li><a href="{% url 'analysis_weekly' %}">週次分析</a></li>
                <li><a href="{% url 'analysis_monthly' %}">月次分析</a></li>
            </ul>
        </div>

        <div class="date-sub" id="current-date">⚡ 今日のタスク</div>
        <div class="date-navigator" style="display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px 16px; border-radius: 10px; border: 1px solid #e9ecef; position: relative; z-index: 10;">
            <button id="btn-prev-date" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #2c3e50; padding: 10px; position: relative; z-index: 20;">◀</button>
            <div id="current-date-display" style="font-size: 18px; font-weight: bold; color: #2c3e50;">2026年06月16日 (火)</div>
            <button id="btn-next-date" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #2c3e50; padding: 10px; position: relative; z-index: 20;">▶</button>
        </div>

        <div class="input-section" id="form-container">
            <form id="todo-form">
                {% csrf_token %}
                <div class="form-group">
                    <select id="category-select" required>
                        {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                        {% empty %}
                            <option value="">カテゴリなし</option>
                        {% endfor %}
                    </select>
                    <input type="text" id="content-input" placeholder="何を実行しますか？" required>
                </div>
                <div class="form-group" style="justify-content: space-between; align-items: center;">
                    <div class="time-input-wrapper">
                        <input type="number" id="time-input" placeholder="予想" min="1">
                        <span style="font-size: 13px; color:#7f8c8d;">分</span>
                    </div>
                    <button type="submit" class="submit-btn" id="form-submit-btn">タスクを追加</button>
                </div>
            </form>
        </div>

        <ul class="todo-list" id="todo-list">
            </ul>
    </div>

    <div class="modal-overlay" id="time-modal">
        <div class="modal-content">
            <h3>⏱️ 実績時間の記録</h3>
            <p>このタスクを実行するのにどれくらいかかりましたか？</p>
            <div style="display: flex; align-items: center; gap: 8px;">
                <input type="number" id="actual-time-input" placeholder="実際にかかった時間" min="0" style="flex:1;">
                <span style="font-size: 14px; color:#7f8c8d;">分</span>
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-skip" id="btn-modal-skip">スキップ</button>
                <button class="modal-btn btn-confirm" id="btn-modal-submit">保存する</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="delete-modal" style="display: none;">
        <div class="modal-content" style="border-top: 4px solid #e74c3c;">
            <h3>🗑️ タスクの削除</h3>
            <p>このタスクを削除しますか？<br><span style="font-size: 12px; color: #7f8c8d;">(この操作は取り消せません)</span></p>
            <div class="modal-actions" style="margin-top: 20px;">
                <button class="modal-btn btn-skip" id="btn-delete-cancel">キャンセル</button>
                <button class="modal-btn btn-confirm" id="btn-delete-submit" style="background-color: #e74c3c;">削除する</button>
            </div>
        </div>
    </div>

</body>
</html>
