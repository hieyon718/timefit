{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFit - 新規登録</title>
    <style>
        body {
            background: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 40px 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
            text-align: center;
            box-sizing: border-box;
        }
        .brand-logo {
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .brand-subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 36px;
            line-height: 1.4;
        }
        .btn-google-signup {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background-color: #f1c40f; /* Warm Yellow */
            color: #ffffff;
            border: 1px solid #f39c12;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(241, 196, 15, 0.2);
            box-sizing: border-box;
        }
        .btn-google-signup:hover {
            background-color: #f39c12;
            transform: translateY(-1px);
        }
        .btn-google-signup img {
            width: 18px;
            height: 18px;
            filter: brightness(0) invert(1);
        }
        .auth-divider {
            margin: 28px 0;
            display: flex;
            align-items: center;
            color: #a0aec0;
            font-size: 11px;
        }
        .auth-divider::before, .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .auth-divider span {
            padding: 0 10px;
        }
        .footer-link {
            font-size: 13px;
            color: #718096;
            line-height: 1.6;
        }
        .footer-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid #cbd5e0;
            padding-bottom: 2px;
        }
        .footer-link a:hover {
            color: #f39c12;
            border-color: #f39c12;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">TimeFit</div>
        <div class="brand-subtitle">🚀 わずか3秒で始める時間管理リポート<br>新しいスマートな習慣의 第一歩</div>

        <a href="{% provider_login_url 'google' %}" class="btn-google-signup">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
            Google アカウントで新規登録
        </a>

        <div class="auth-divider">
            <span>または</span>
        </div>

        <div class="footer-link">
            すでにアカウントをお持ちですか？ <br><br>
            <a href="{% url 'account_login' %}">ID / パスワードでログインする</a>
        </div>
    </div>

</body>
</html>
