<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFit - ログイン</title>
    <style>
        body {
            background: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border: 1px solid #edf2f7;
            border-radius: 16px;
            padding: 40px 28px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
            box-sizing: border-box;
        }
        .brand-logo {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .brand-subtitle {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 28px;
            line-height: 1.4;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #f1c40f;
        }
        /* 🟡 [색상 변경] 일반 ID/PW 로그인 버튼 Warm Yellow 적용 */
        .btn-login-submit {
            width: 100%;
            background-color: #f1c40f; /* Warm Yellow */
            color: #ffffff;
            border: 1px solid #f39c12;
            padding: 13px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(241, 196, 15, 0.2);
            margin-top: 10px;
        }
        .btn-login-submit:hover {
            background-color: #f39c12;
            transform: translateY(-1px);
        }
        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-bottom: 14px;
            text-align: center;
        }
        .auth-divider {
            margin: 24px 0;
            display: flex;
            align-items: center;
            color: #a0aec0;
            font-size: 11px;
        }
        .auth-divider::before, .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .auth-divider span {
            padding: 0 10px;
        }
        .footer-link {
            text-align: center;
            font-size: 13px;
            color: #718096;
            line-height: 1.6;
        }
        .footer-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid #cbd5e0;
            padding-bottom: 2px;
        }
        .footer-link a:hover {
            color: #f39c12;
            border-color: #f39c12;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-logo">TimeFit</div>
        <div class="brand-subtitle">おかえりなさい！<br>IDとパスワードを入力してください。</div>

        <form method="POST" action="{% url 'account_login' %}">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-msg">⚠️ IDまたはパスワードが正しくありません。</div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">ユーザーID</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="IDを入力" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="id_password">パスワード</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="パスワードを入力" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login-submit">ログイン</button>
        </form>

        <div class="auth-divider">
            <span>または</span>
        </div>

        <div class="footer-link">
            アカウントをお持ちでないですか？ <br><br>
            <a href="{% url 'account_signup' %}">新規アカウントを作成する（無料）</a>
        </div>
    </div>

</body>
</html>
